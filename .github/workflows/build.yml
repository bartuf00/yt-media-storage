name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libsodium-dev \
            libomp-dev

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --parallel 2

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/media_storage
            build/media_storage_gui
            build/libmedia_storage.so*
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libsodium

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -S . -G Ninja

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel 2

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/media_storage.exe
            build/media_storage_gui.exe
            build/media_storage.dll
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/*
            artifacts/windows/*
